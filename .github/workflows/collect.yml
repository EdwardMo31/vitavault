name: Auto Collect Articles

on:
  schedule:
    - cron: '0 2 * * *'   # 每天 UTC 02:00（北京时间 10:00）
  workflow_dispatch:        # 允许在 GitHub 网页手动触发

permissions:
  contents: write           # 允许 workflow 提交文件

jobs:
  collect:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Run collect.py
        run: python collect.py

      - name: Commit if articles_data.js changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add articles_data.js denylist.json
          if git diff --cached --quiet; then
            echo "没有新文章，跳过提交。"
          else
            git commit -m "auto: collect new articles $(date -u +'%Y-%m-%d')"
            git push
          fi
